id: arithmetic_reasoning
category: reasoning
requires_frontier: false
prompt: |
  A train leaves at 2:00 traveling 60 km/h. Another leaves the same station
  at 3:00 traveling 90 km/h on the same route. At what time does the second
  train catch the first? Give the answer as HH:MM and show your work.
expected:
  answer: "5:00"
scoring:
  method: exact
  rubric: |
    Award full marks if the final answer is 5:00 (or 05:00) and the working is
    correct. Award partial marks for the correct method but a small arithmetic
    slip. Award zero if the approach is wrong.
max_tokens: 1024
tags: [reasoning]